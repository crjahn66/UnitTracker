name: Build Android APK

on:
  push:
    branches: [master, main, 'android-test-*']
  workflow_dispatch:

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm downloads
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package.json') }}
          restore-keys: npm-

      - name: Cache Gradle wrapper and dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('package.json') }}
          restore-keys: gradle-

      - name: Cache Android SDK NDK and CMake
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/lib/android/sdk/ndk
            /usr/local/lib/android/sdk/cmake
          key: android-ndk-cmake-27.1.12297006-3.22.1

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-package-lock

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Limit to arm64-v8a only
        run: |
          sed -i 's/abiFilters .*/abiFilters "arm64-v8a"/' android/app/build.gradle
          grep -q 'abiFilters' android/app/build.gradle || \
            sed -i '/defaultConfig {/a\        ndk { abiFilters "arm64-v8a" }' android/app/build.gradle

      - name: Enable JS bundle in debug APK
        run: sed -i '/^react {/a\    debuggableVariants = []' android/app/build.gradle

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Publish APK to GitHub Releases
        if: success() && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOTES: ${{ github.event.head_commit.message }}
          RUN_NUMBER: ${{ github.run_number }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          export VERSION=$(node -p "require('./app.json').expo.version")
          export VERSION_CODE="$RUN_NUMBER"
          TAG="v${VERSION}-build${VERSION_CODE}"
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"

          # Predictable "latest" download URLs (302 redirect to current release):
          #   https://github.com/<repo>/releases/latest/download/UnitTracker.apk
          #   https://github.com/<repo>/releases/latest/download/version.json
          export PUBLIC_URL="https://github.com/${REPO}/releases/latest/download/UnitTracker.apk"

          # Truncate commit message to 1000 chars for notes
          export NOTES=$(printf '%s' "$NOTES" | head -c 1000)

          # Build version.json
          node -e '
            const fs = require("fs");
            const v = {
              version: process.env.VERSION,
              versionCode: Number(process.env.VERSION_CODE),
              url: process.env.PUBLIC_URL,
              notes: process.env.NOTES || "",
              minVersion: process.env.VERSION,
              publishedAt: new Date().toISOString(),
              commit: process.env.GITHUB_SHA
            };
            fs.writeFileSync("version.json", JSON.stringify(v, null, 2));
            console.log(JSON.stringify(v, null, 2));
          '

          # Stage assets with the fixed names we want users to download
          mkdir -p release-assets
          cp "$APK_PATH" "release-assets/UnitTracker.apk"
          cp version.json release-assets/version.json

          echo "Creating release $TAG ..."
          gh release create "$TAG" \
            --repo "$REPO" \
            --title "v${VERSION} (build ${VERSION_CODE})" \
            --notes "$NOTES" \
            release-assets/UnitTracker.apk \
            release-assets/version.json

          echo "Published v${VERSION} (build ${VERSION_CODE})"
          echo "APK:          $PUBLIC_URL"
          echo "version.json: https://github.com/${REPO}/releases/latest/download/version.json"
