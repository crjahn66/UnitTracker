name: Build Android APK

on:
  push:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm downloads
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package.json') }}
          restore-keys: npm-

      - name: Cache Gradle wrapper and dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('package.json') }}
          restore-keys: gradle-

      - name: Cache Android SDK NDK and CMake
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/lib/android/sdk/ndk
            /usr/local/lib/android/sdk/cmake
          key: android-ndk-cmake-27.1.12297006-3.22.1

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-package-lock

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Limit to arm64-v8a only
        run: |
          sed -i 's/abiFilters .*/abiFilters "arm64-v8a"/' android/app/build.gradle
          grep -q 'abiFilters' android/app/build.gradle || \
            sed -i '/defaultConfig {/a\        ndk { abiFilters "arm64-v8a" }' android/app/build.gradle

      - name: Enable JS bundle in debug APK
        run: sed -i '/^react {/a\    debuggableVariants = []' android/app/build.gradle

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Publish APK to Supabase Storage
        if: success()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BUCKET: app-releases
          NOTES: ${{ github.event.head_commit.message }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          set -e
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::warning::SUPABASE_URL or SUPABASE_SERVICE_ROLE_KEY not set; skipping publish."
            exit 0
          fi
          export VERSION=$(node -p "require('./app.json').expo.version")
          export VERSION_CODE="$RUN_NUMBER"
          APK_NAME="UnitTracker-${VERSION}-${VERSION_CODE}.apk"
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          export PUBLIC_URL="${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${APK_NAME}"

          echo "Uploading $APK_NAME ..."
          curl -fSs -X POST \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "x-upsert: true" \
            -H "Content-Type: application/vnd.android.package-archive" \
            -H "cache-control: max-age=3600" \
            --data-binary "@${APK_PATH}" \
            "${SUPABASE_URL}/storage/v1/object/${BUCKET}/${APK_NAME}"
          echo

          # Truncate notes to 1000 chars
          export NOTES=$(printf '%s' "$NOTES" | head -c 1000)

          VERSION_JSON=$(node -e '
            const v = {
              version: process.env.VERSION,
              versionCode: Number(process.env.VERSION_CODE),
              url: process.env.PUBLIC_URL,
              notes: process.env.NOTES || "",
              publishedAt: new Date().toISOString(),
              commit: process.env.GITHUB_SHA
            };
            process.stdout.write(JSON.stringify(v, null, 2));
          ')
          echo "$VERSION_JSON"

          echo "Uploading version.json ..."
          printf '%s' "$VERSION_JSON" | curl -fSs -X POST \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "x-upsert: true" \
            -H "Content-Type: application/json" \
            -H "cache-control: no-cache" \
            --data-binary @- \
            "${SUPABASE_URL}/storage/v1/object/${BUCKET}/version.json"
          echo
          echo "Published v${VERSION} (code ${VERSION_CODE}) -> ${PUBLIC_URL}"
