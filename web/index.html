<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>UnitTracker</title>
    <style id="expo-reset">
      html, body { height: 100%; }
      body { overflow: hidden; }
      #root { display: flex; height: 100%; flex: 1; }
    </style>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        document.body.style.cssText = 'background:#0d1117;color:#f85149;font-family:monospace;padding:20px;overflow:auto;';
        document.body.innerHTML =
          '<h2 style="margin:0 0 12px">JS Error</h2>' +
          '<pre style="color:#ff9900;white-space:pre-wrap">' + msg + '</pre>' +
          '<pre style="color:#e6edf3;font-size:12px;white-space:pre-wrap">' + (err ? err.stack : 'line ' + line + ':' + col) + '</pre>';
        return false;
      };
      window.addEventListener('unhandledrejection', function(e) {
        document.body.style.cssText = 'background:#0d1117;color:#f85149;font-family:monospace;padding:20px;overflow:auto;';
        document.body.innerHTML =
          '<h2 style="margin:0 0 12px">Unhandled Promise Rejection</h2>' +
          '<pre style="color:#e6edf3;white-space:pre-wrap">' + (e.reason && e.reason.stack ? e.reason.stack : String(e.reason)) + '</pre>';
      });
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
